# ── Production Profile ────────────────────────────────────────────────────────
# Production — credentials via env vars only, no DDL changes, minimal logging

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.payroll=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm.jdbc.extract=OFF
logging.level.org.hibernate.orm.jdbc.error=OFF
logging.level.org.hibernate.orm.core=OFF
logging.level.org.springframework.web=ERROR
