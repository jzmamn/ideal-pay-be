spring.application.name=ideal-pay-be

# ── Active Profile ────────────────────────────────────────────────────────────
# Override via: -Dspring.profiles.active=qa  (or env var SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev

# ── DataSource (shared defaults — overridden per profile) ─────────────────────
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate (shared) ──────────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging (shared) ──────────────────────────────────────────────────────────
logging.exception-conversion-word=%wEx


license.public-key=classpath:license/public-key.pem
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

license.payload-encryption-key=${LICENSE_PAYLOAD_ENCRYPTION_KEY:VGhpc0lzQURldk9ubHlLZXlGb3JJZGVhbFBheSEhISE=}

# ── Database backup / restore ─────────────────────────────────────────────────
# Default directory for full-backup .sql files (overridable per request from the
# admin UI, or via the BACKUP_DIR env var)
app.backup.directory=${BACKUP_DIR:./backups}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET in production with a 256-bit (32+ char) random value
jwt.secret=${JWT_SECRET:IdealPayDefaultSecretKeyForDevOnly1234567890AB}
jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
jwt.refresh-token-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}
