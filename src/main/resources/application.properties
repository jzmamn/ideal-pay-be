spring.application.name=ideal-pay-be

# ── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ideal_pay
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging ───────────────────────────────────────────────────────────────────
# Suppress Hibernate SQL and JDBC noise
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm.jdbc.extract=OFF
logging.level.org.hibernate.orm.jdbc.error=OFF
logging.level.org.hibernate.orm.core=OFF

# Show full exception stack traces for application errors
logging.level.com.payroll=DEBUG
logging.exception-conversion-word=%wEx

