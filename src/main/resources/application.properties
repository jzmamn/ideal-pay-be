spring.application.name=ideal-pay-be

# ── Active Profile ────────────────────────────────────────────────────────────
# Override via: -Dspring.profiles.active=qa  (or env var SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev

# ── DataSource (shared defaults — overridden per profile) ─────────────────────
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate (shared) ──────────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging (shared) ──────────────────────────────────────────────────────────
logging.exception-conversion-word=%wEx


license.public-key=classpath:license/public-key.pem
spring.servlet.multipart.max-file-size=256KB

license.payload-encryption-key=${LICENSE_PAYLOAD_ENCRYPTION_KEY:VGhpc0lzQURldk9ubHlLZXlGb3JJZGVhbFBheSEhISE=}
