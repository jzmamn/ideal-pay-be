# ── Dev Profile ───────────────────────────────────────────────────────────────
# Local development — verbose logging, local MySQL, DDL auto-update

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ideal_pay_test
spring.datasource.username=root
spring.datasource.password=1234

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.payroll=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR
logging.level.org.springframework.web=ERROR
logging.level.com.payroll.service.AuthService=ERROR
